name: Build, deploy & release

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deployments
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prettier --check .
      - run: pnpm test

      # Next.js embeds basePath into the exported asset URLs, so Cloudflare (/)
      # and GitHub Pages (/repository-name/) require separate production builds.
      - name: Build for Cloudflare Pages
        run: pnpm run build
      - run: pnpm run check:pwa
      - uses: actions/upload-artifact@v4
        with:
          name: cloudflare-pages
          path: ./out

      - name: Build for GitHub Pages
        run: pnpm run build
        env:
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"
      - run: pnpm run check:pwa -- "/${{ github.event.repository.name }}"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: cloudflare-pages
          path: ./out
      - name: Deploy to Cloudflare Pages
        run: npx --yes wrangler@4 pages deploy out --project-name atelier --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ncipollo/release-action@v1
        with:
          tag: v-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          generateReleaseNotes: true
